<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Minesweeper // Acnologia</title>
    <link rel="stylesheet" href="../style.css" />
    <style>
        .ms-board {
            display: inline-grid;
            gap: 2px;
            padding: 8px;
            background: var(--bg2);
            border: 2px inset var(--border);
            user-select: none;
        }

        .ms-cell {
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px outset rgba(255, 255, 255, 0.12);
            background: var(--bg3);
            font-size: 13px;
            cursor: pointer;
            font-family: var(--font-mono);
            font-weight: bold;
            transition: background 0.1s;
            -webkit-user-select: none;
            user-select: none;
        }

        .ms-cell:hover:not(.revealed):not(.flagged) {
            background: var(--panel);
        }

        .ms-cell.revealed {
            border-style: inset;
            background: var(--bg);
            cursor: default;
        }

        .ms-cell.flagged {
            color: var(--accent);
        }

        .ms-cell.mine-exploded {
            background: var(--accent) !important;
        }

        .ms-cell[data-n="1"] {
            color: #4fc3f7;
        }

        .ms-cell[data-n="2"] {
            color: #81c784;
        }

        .ms-cell[data-n="3"] {
            color: var(--accent);
        }

        .ms-cell[data-n="4"] {
            color: var(--purple);
        }

        .ms-cell[data-n="5"] {
            color: #ff5722;
        }

        .ms-cell[data-n="6"] {
            color: var(--cyan);
        }

        .ms-cell[data-n="7"] {
            color: var(--text);
        }

        .ms-cell[data-n="8"] {
            color: var(--text-dim);
        }

        .ms-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 10px;
            background: var(--bg2);
            border: 2px inset var(--border);
            margin-bottom: 6px;
            gap: 16px;
        }

        .ms-counter {
            font-family: var(--font-pixel);
            font-size: 14px;
            color: var(--accent);
            background: #000;
            padding: 4px 10px;
            min-width: 60px;
            text-align: center;
            text-shadow: 0 0 6px var(--accent);
        }

        .ms-reset {
            font-size: 20px;
            cursor: pointer;
            background: var(--bg3);
            border: 2px outset rgba(255, 255, 255, 0.12);
            padding: 2px 10px;
            transition: filter 0.1s;
        }

        .ms-reset:hover {
            filter: brightness(1.3);
        }

        .ms-reset:active {
            border-style: inset;
        }
    </style>
</head>

<body>
    <div class="status-bar">
        <div class="status-left">
            <span class="status-dot"></span>
            <a href="../index.html" style="color:var(--text-dim);font-size:11px;">← ACNOLOGIA.DEV</a>
        </div>
        <div class="status-right"><span id="clock" class="clock">00:00:00</span></div>
    </div>

    <div class="game-page" style="max-width:700px; padding-top:16px;">
        <a href="../index.html#games" class="back-link" onclick="history.back();return false;">← Back to Games</a>

        <div class="window">
            <div class="window-title">
                <div class="win-buttons">
                    <span class="win-btn close" onclick="window.location.href='../index.html'" title="Close"></span>
                    <span class="win-btn min"></span>
                    <span class="win-btn max"></span>
                </div>
                💣 minesweeper.exe
            </div>
            <div class="window-body">
                <div class="game-hud" style="margin-bottom:10px;">
                    <div class="diff-btn-group">
                        <button class="diff-btn active" data-diff="easy">Easy</button>
                        <button class="diff-btn" data-diff="medium">Medium</button>
                        <button class="diff-btn" data-diff="hard">Hard</button>
                    </div>
                    <div class="hud-stat">
                        <span class="text-dim" style="font-size:9px;">Best Time</span>
                        <span class="hud-val" id="ms-best">--:--</span>
                    </div>
                </div>

                <div class="ms-header">
                    <div class="ms-counter" id="ms-mines">000</div>
                    <button class="ms-reset" id="ms-reset" title="New Game">🙂</button>
                    <div class="ms-counter" id="ms-timer">000</div>
                </div>

                <div id="ms-board" class="ms-board"></div>

                <p class="text-dim" style="font-size:10px; margin-top:10px;">
                    Left-click to reveal · Right-click to flag · Middle-click to chord
                </p>
            </div>
        </div>
    </div>

    <script src="../main.js"></script>
    <script>
        'use strict';
        const CONFIGS = {
            easy: { rows: 9, cols: 9, mines: 10 },
            medium: { rows: 16, cols: 16, mines: 40 },
            hard: { rows: 16, cols: 30, mines: 99 },
        };

        let config = { ...CONFIGS.easy };
        let board = [], flagged = new Set(), revealed = new Set();
        let gameState = 'idle'; // idle | playing | won | lost
        let timerInterval = null, elapsed = 0, firstClick = true;

        const boardEl = document.getElementById('ms-board');
        const minesEl = document.getElementById('ms-mines');
        const timerEl = document.getElementById('ms-timer');
        const resetBtn = document.getElementById('ms-reset');
        const bestEl = document.getElementById('ms-best');

        function pad(n, l = 3) { return String(n).padStart(l, '0'); }
        function fmtTimer(s) { return pad(s); }

        function initGame() {
            clearInterval(timerInterval);
            elapsed = 0; firstClick = true;
            gameState = 'idle';
            board = []; flagged.clear(); revealed.clear();
            timerEl.textContent = pad(0);
            minesEl.textContent = pad(config.mines);
            resetBtn.textContent = '🙂';

            // Create empty board
            for (let r = 0; r < config.rows; r++) {
                board[r] = [];
                for (let c = 0; c < config.cols; c++) {
                    board[r][c] = { mine: false, adj: 0 };
                }
            }
            renderBoard();
        }

        function placeMines(safeR, safeC) {
            const safe = new Set([`${safeR},${safeC}`]);
            // also protect neighbors
            for (let dr = -1; dr <= 1; dr++)
                for (let dc = -1; dc <= 1; dc++)
                    safe.add(`${safeR + dr},${safeC + dc}`);

            let placed = 0;
            while (placed < config.mines) {
                const r = Math.floor(Math.random() * config.rows);
                const c = Math.floor(Math.random() * config.cols);
                if (!board[r][c].mine && !safe.has(`${r},${c}`)) {
                    board[r][c].mine = true;
                    placed++;
                }
            }
            // calc adjacency
            for (let r = 0; r < config.rows; r++)
                for (let c = 0; c < config.cols; c++) {
                    if (board[r][c].mine) continue;
                    let cnt = 0;
                    for (let dr = -1; dr <= 1; dr++) for (let dc = -1; dc <= 1; dc++) {
                        const nr = r + dr, nc = c + dc;
                        if (nr >= 0 && nr < config.rows && nc >= 0 && nc < config.cols && board[nr][nc].mine) cnt++;
                    }
                    board[r][c].adj = cnt;
                }
        }

        function startTimer() {
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                elapsed = Math.min(elapsed + 1, 999);
                timerEl.textContent = fmtTimer(elapsed);
            }, 1000);
        }

        function reveal(r, c) {
            const key = `${r},${c}`;
            if (revealed.has(key) || flagged.has(key)) return;
            if (r < 0 || r >= config.rows || c < 0 || c >= config.cols) return;

            revealed.add(key);
            const cell = board[r][c];

            if (cell.mine) {
                gameState = 'lost';
                resetBtn.textContent = '😵';
                // Reveal all mines
                for (let rr = 0; rr < config.rows; rr++)
                    for (let cc = 0; cc < config.cols; cc++)
                        if (board[rr][cc].mine) revealed.add(`${rr},${cc}`);
                clearInterval(timerInterval);
                renderBoard(r, c);
                return;
            }

            if (cell.adj === 0) {
                for (let dr = -1; dr <= 1; dr++) for (let dc = -1; dc <= 1; dc++)
                    reveal(r + dr, c + dc);
            }
        }

        function chord(r, c) {
            const key = `${r},${c}`;
            if (!revealed.has(key)) return;
            const cell = board[r][c];
            if (!cell.adj) return;
            // count flags around
            let fc = 0;
            for (let dr = -1; dr <= 1; dr++) for (let dc = -1; dc <= 1; dc++) {
                if (flagged.has(`${r + dr},${c + dc}`)) fc++;
            }
            if (fc === cell.adj) {
                for (let dr = -1; dr <= 1; dr++) for (let dc = -1; dc <= 1; dc++)
                    reveal(r + dr, c + dc);
            }
        }

        function checkWin() {
            const totalSafe = config.rows * config.cols - config.mines;
            if (revealed.size >= totalSafe) {
                gameState = 'won';
                clearInterval(timerInterval);
                resetBtn.textContent = '😎';
                // Save best
                const bestKey = `ms-best-${Object.keys(CONFIGS).find(k => CONFIGS[k] === config) || 'easy'}`;
                const prev = parseInt(localStorage.getItem(bestKey) || '9999', 10);
                if (elapsed < prev) {
                    localStorage.setItem(bestKey, elapsed);
                    bestEl.textContent = fmtTimer(elapsed);
                }
            }
        }

        function renderBoard(explodedR, explodedC) {
            boardEl.style.gridTemplateColumns = `repeat(${config.cols}, 28px)`;
            boardEl.innerHTML = '';
            for (let r = 0; r < config.rows; r++) {
                for (let c = 0; c < config.cols; c++) {
                    const key = `${r},${c}`;
                    const cell = document.createElement('div');
                    cell.className = 'ms-cell';
                    cell.dataset.r = r; cell.dataset.c = c;

                    if (revealed.has(key)) {
                        cell.classList.add('revealed');
                        if (board[r][c].mine) {
                            cell.textContent = '💣';
                            if (r === explodedR && c === explodedC) cell.classList.add('mine-exploded');
                        } else if (board[r][c].adj > 0) {
                            cell.textContent = board[r][c].adj;
                            cell.dataset.n = board[r][c].adj;
                        }
                    } else if (flagged.has(key)) {
                        cell.classList.add('flagged');
                        cell.textContent = '🚩';
                    }

                    cell.addEventListener('click', handleLeftClick);
                    cell.addEventListener('contextmenu', handleRightClick);
                    cell.addEventListener('auxclick', handleMiddleClick);
                    boardEl.appendChild(cell);
                }
            }

            // Update flag counter
            minesEl.textContent = pad(Math.max(0, config.mines - flagged.size));
            if (gameState === 'won' || gameState === 'lost') {
                checkWin();
            }
        }

        function handleLeftClick(e) {
            if (gameState === 'lost' || gameState === 'won') return;
            const r = +e.currentTarget.dataset.r;
            const c = +e.currentTarget.dataset.c;

            if (firstClick) {
                firstClick = false;
                gameState = 'playing';
                placeMines(r, c);
                startTimer();
            }

            reveal(r, c);
            if (gameState !== 'lost') checkWin();
            renderBoard();
        }

        function handleRightClick(e) {
            e.preventDefault();
            if (gameState === 'lost' || gameState === 'won') return;
            const r = +e.currentTarget.dataset.r;
            const c = +e.currentTarget.dataset.c;
            const key = `${r},${c}`;
            if (revealed.has(key)) return;
            if (flagged.has(key)) flagged.delete(key); else flagged.add(key);
            renderBoard();
        }

        function handleMiddleClick(e) {
            if (e.button !== 1) return;
            e.preventDefault();
            if (gameState !== 'playing') return;
            const r = +e.currentTarget.dataset.r;
            const c = +e.currentTarget.dataset.c;
            chord(r, c);
            if (gameState !== 'lost') checkWin();
            renderBoard();
        }

        resetBtn.addEventListener('click', initGame);

        document.querySelectorAll('.diff-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                config = { ...CONFIGS[btn.dataset.diff] };
                // Load best time
                const bestKey = `ms-best-${btn.dataset.diff}`;
                const best = parseInt(localStorage.getItem(bestKey) || '9999', 10);
                bestEl.textContent = best < 999 ? fmtTimer(best) : '--:--';
                initGame();
            });
        });

        initGame();
    </script>
</body>

</html>
