<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Snake // Acnologia</title>
    <link rel="stylesheet" href="../style.css" />
</head>

<body>
    <div class="status-bar">
        <div class="status-left">
            <span class="status-dot"></span>
            <a href="../index.html" style="color:var(--text-dim);font-size:11px;">← ACNOLOGIA.DEV</a>
        </div>
        <div class="status-right"><span id="clock" class="clock">00:00:00</span></div>
    </div>

    <div class="game-page" style="max-width:580px; padding-top:16px;">
        <a href="../index.html#games" class="back-link" onclick="history.back();return false;">← Back to Games</a>

        <div class="window">
            <div class="window-title">
                <div class="win-buttons">
                    <span class="win-btn close" onclick="window.location.href='../index.html'" title="Close"></span>
                    <span class="win-btn min"></span>
                    <span class="win-btn max"></span>
                </div>
                🐍 snake.exe
            </div>
            <div class="window-body" style="display:flex;flex-direction:column;align-items:center;gap:12px;">
                <div class="game-hud" style="width:500px;max-width:100%;">
                    <div class="hud-stat">
                        <span class="text-dim" style="font-size:9px;">SCORE</span>
                        <span class="hud-val" id="snake-score">0</span>
                    </div>
                    <div class="hud-stat">
                        <span class="text-dim" style="font-size:9px;">HIGH SCORE</span>
                        <span class="hud-val" id="snake-hi">0</span>
                    </div>
                    <div class="hud-stat">
                        <span class="text-dim" style="font-size:9px;">LEVEL</span>
                        <span class="hud-val" id="snake-level">1</span>
                    </div>
                    <button class="game-btn primary" id="snake-restart">NEW GAME</button>
                </div>

                <div class="game-canvas-wrap" style="position:relative;">
                    <canvas id="snake-canvas" width="500" height="500"></canvas>
                    <div class="game-overlay" id="snake-overlay">
                        <div class="overlay-title">🐍 SNAKE</div>
                        <div class="overlay-sub">Press SPACE or tap to start</div>
                        <button class="game-btn primary" id="snake-start-btn">START</button>
                    </div>
                </div>

                <p class="text-dim" style="font-size:10px; text-align:center;">
                    WASD / Arrow Keys to move · SPACE to pause · mobile: tap arrow buttons below
                </p>

                <!-- Mobile controls -->
                <div
                    style="display:grid;grid-template-columns:repeat(3,44px);grid-template-rows:repeat(2,44px);gap:4px;">
                    <div></div>
                    <button class="game-btn" id="m-up" style="width:44px;height:44px;text-align:center;">▲</button>
                    <div></div>
                    <button class="game-btn" id="m-left" style="width:44px;height:44px;text-align:center;">◄</button>
                    <button class="game-btn" id="m-down" style="width:44px;height:44px;text-align:center;">▼</button>
                    <button class="game-btn" id="m-right" style="width:44px;height:44px;text-align:center;">►</button>
                </div>
            </div>
        </div>
    </div>

    <script src="../main.js"></script>
    <script>
        'use strict';
        const canvas = document.getElementById('snake-canvas');
        const ctx = canvas.getContext('2d');
        const COLS = 25, ROWS = 25;
        const CELL = canvas.width / COLS;
        const overlay = document.getElementById('snake-overlay');
        const scoreEl = document.getElementById('snake-score');
        const hiEl = document.getElementById('snake-hi');
        const levelEl = document.getElementById('snake-level');
        const restartBtn = document.getElementById('snake-restart');
        const startBtn = document.getElementById('snake-start-btn');

        let snake, dir, nextDir, food, score, hiScore, level, gameLoop, running, paused;

        // Colors
        const C = {
            bg: '#080810',
            grid: '#0d0d1a',
            snake: '#00ffcc',
            snakeD: '#009966',
            head: '#ffffff',
            food: '#ff3366',
            foodGl: 'rgba(255,51,102,0.4)',
            text: '#c8c8e8',
        };

        hiScore = parseInt(localStorage.getItem('snake-hi') || '0', 10);
        hiEl.textContent = hiScore;

        function init() {
            snake = [
                { x: 12, y: 12 },
                { x: 11, y: 12 },
                { x: 10, y: 12 },
            ];
            dir = { x: 1, y: 0 };
            nextDir = { x: 1, y: 0 };
            score = 0; level = 1;
            scoreEl.textContent = 0;
            levelEl.textContent = 1;
            placeFood();
            running = false; paused = false;
        }

        function placeFood() {
            let f;
            do {
                f = { x: Math.floor(Math.random() * COLS), y: Math.floor(Math.random() * ROWS) };
            } while (snake.some(s => s.x === f.x && s.y === f.y));
            food = f;
        }

        function step() {
            dir = { ...nextDir };
            const head = { x: (snake[0].x + dir.x + COLS) % COLS, y: (snake[0].y + dir.y + ROWS) % ROWS };

            if (snake.some(s => s.x === head.x && s.y === head.y)) {
                gameOver();
                return;
            }

            snake.unshift(head);

            if (head.x === food.x && head.y === food.y) {
                score += 10 * level;
                scoreEl.textContent = score;
                if (score > hiScore) {
                    hiScore = score;
                    hiEl.textContent = hiScore;
                    localStorage.setItem('snake-hi', hiScore);
                }
                level = Math.floor(score / 100) + 1;
                levelEl.textContent = level;
                placeFood();
                // Speed up
                clearInterval(gameLoop);
                gameLoop = setInterval(step, Math.max(60, 180 - level * 12));
            } else {
                snake.pop();
            }

            draw();
        }

        function draw() {
            // Background
            ctx.fillStyle = C.bg;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Grid
            ctx.strokeStyle = C.grid;
            ctx.lineWidth = 0.5;
            for (let x = 0; x <= COLS; x++) {
                ctx.beginPath(); ctx.moveTo(x * CELL, 0); ctx.lineTo(x * CELL, canvas.height); ctx.stroke();
            }
            for (let y = 0; y <= ROWS; y++) {
                ctx.beginPath(); ctx.moveTo(0, y * CELL); ctx.lineTo(canvas.width, y * CELL); ctx.stroke();
            }

            // Food (glowing)
            ctx.shadowColor = C.foodGl;
            ctx.shadowBlur = 12;
            ctx.fillStyle = C.food;
            ctx.fillRect(food.x * CELL + 2, food.y * CELL + 2, CELL - 4, CELL - 4);
            ctx.shadowBlur = 0;

            // Snake
            snake.forEach((seg, i) => {
                ctx.shadowColor = i === 0 ? 'rgba(0,255,204,0.6)' : 'transparent';
                ctx.shadowBlur = i === 0 ? 10 : 0;
                ctx.fillStyle = i === 0 ? C.head : i % 2 === 0 ? C.snake : C.snakeD;
                ctx.fillRect(seg.x * CELL + 1, seg.y * CELL + 1, CELL - 2, CELL - 2);
            });
            ctx.shadowBlur = 0;
        }

        function gameOver() {
            clearInterval(gameLoop);
            running = false;
            overlay.innerHTML = `
      <div class="overlay-title">GAME OVER</div>
      <div class="overlay-sub">Score: ${score}</div>
      <button class="game-btn primary" id="snake-start-btn">PLAY AGAIN</button>
    `;
            overlay.style.display = 'flex';
            document.getElementById('snake-start-btn').addEventListener('click', startGame);
        }

        function startGame() {
            init();
            overlay.style.display = 'none';
            running = true; paused = false;
            draw();
            gameLoop = setInterval(step, 180);
        }

        function togglePause() {
            if (!running) return;
            if (paused) {
                paused = false;
                gameLoop = setInterval(step, Math.max(60, 180 - level * 12));
                overlay.style.display = 'none';
            } else {
                paused = true;
                clearInterval(gameLoop);
                overlay.innerHTML = `<div class="overlay-title">PAUSED</div><button class="game-btn primary" id="snake-start-btn">RESUME</button>`;
                overlay.style.display = 'flex';
                document.getElementById('snake-start-btn').addEventListener('click', togglePause);
            }
        }

        // Key controls
        const DIRS = {
            ArrowUp: { x: 0, y: -1 }, KeyW: { x: 0, y: -1 },
            ArrowDown: { x: 0, y: 1 }, KeyS: { x: 0, y: 1 },
            ArrowLeft: { x: -1, y: 0 }, KeyA: { x: -1, y: 0 },
            ArrowRight: { x: 1, y: 0 }, KeyD: { x: 1, y: 0 },
        };

        document.addEventListener('keydown', e => {
            if (e.code === 'Space') { e.preventDefault(); togglePause(); return; }
            const d = DIRS[e.code];
            if (d && !(d.x === -dir.x && d.y === -dir.y)) {
                nextDir = d;
                if (!running) startGame();
            }
        });

        // Mobile buttons
        [['m-up', { x: 0, y: -1 }], ['m-down', { x: 0, y: 1 }], ['m-left', { x: -1, y: 0 }], ['m-right', { x: 1, y: 0 }]].forEach(([id, d]) => {
            document.getElementById(id).addEventListener('click', () => {
                if (!(d.x === -dir.x && d.y === -dir.y)) nextDir = d;
                if (!running) startGame();
            });
        });

        restartBtn.addEventListener('click', startGame);
        startBtn.addEventListener('click', startGame);

        init();
        draw();
    </script>
</body>

</html>
